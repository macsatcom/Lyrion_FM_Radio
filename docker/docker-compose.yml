services:
  fm-radio:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    # privileged gives the container permission to call libusb_detach_kernel_driver(),
    # which lets librtlsdr claim the dongle even if the host's rtl-dvb kernel drivers
    # are loaded. See README for notes on blacklisting those drivers.
    privileged: true
    devices:
      - /dev/bus/usb:/dev/bus/usb   # passes all USB devices into the container
    ports:
      - "8080:8080"   # FM Daemon HTTP API
      - "8000:8000"   # Icecast stream — only needed when ICECAST_MODE=internal
    environment:
      # ── Icecast mode ────────────────────────────────────────────────────────
      # 'internal'  — start Icecast inside this container (default)
      # 'external'  — use an existing Icecast server; set ICECAST_HOST below
      ICECAST_MODE:        internal

      # Required when ICECAST_MODE=external; ignored when internal (always localhost)
      #ICECAST_HOST:       192.168.1.50

      # ── Icecast credentials / mount ─────────────────────────────────────────
      ICECAST_SOURCE:      changeme          # source password (ffmpeg → Icecast)
      ICECAST_ADMIN_PASS:  changeme_admin    # Icecast web admin password (internal only)
      ICECAST_PORT:        "8000"
      ICECAST_MOUNT:       /fm
      # ── Daemon ──────────────────────────────────────────────────────────────
      STARTUP_FREQ:        "90800000"        # startup frequency in Hz (90.8 MHz)
      RTL_DEVICE:          "0"              # RTL-SDR device index (0 = first dongle)
      DAEMON_PORT:         "8080"
    restart: unless-stopped
