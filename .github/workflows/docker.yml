name: Build and push Docker image

on:
  push:
    branches:
      - main          # builds 'latest' on every push to main
    tags:
      - 'v*'          # builds versioned image on git tags (e.g. v1.04)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # needed to push to ghcr.io

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # QEMU lets the runner emulate arm64 so we can cross-compile
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      # Buildx is the Docker plugin that handles multi-platform builds
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Generates image tags automatically:
      #   push to main  → ghcr.io/<owner>/lyrion-fm-radio:latest
      #   push tag v1.04 → ghcr.io/<owner>/lyrion-fm-radio:v1.04
      #                     ghcr.io/<owner>/lyrion-fm-radio:latest
      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/lyrion-fm-radio
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=semver,pattern={{version}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Cache layers in GitHub's cache to speed up subsequent builds
          cache-from: type=gha
          cache-to: type=gha,mode=max
